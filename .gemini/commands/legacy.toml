description = "Legacy - Reverse Engineering Documentation from existing code."

prompt = """
---
description: Legacy - Reverse Engineering Documentation.
---

# Legacy - Reverse Engineering Documentation

Analyzes existing code and generates documentation (ADR/SDD/DDD/TDD/VDD flows) automatically.

## Command: {{args}}

```
/legacy                              # BFS: analyze entire project from root
/legacy src/auth                     # BFS: analyze only src/auth
/legacy src/auth "JWT validation"    # DFS: focus on JWT validation in src/auth
```

### No comment - BFS Mode

Breadth-first recursive analysis:
```
Iteration 1: Root → top-level modules (depth 0)
Iteration 2: Each module → submodules (depth 1)
Iteration 3: Submodules → components (depth 2)
...continue until fully analyzed
```

### With comment - DFS Mode

Depth-first focused analysis:
```
1. Find code related to comment
2. Analyze deeply in that area
3. Create focused flows for that functionality
```

---

## Flow Type Detection - Module-First Approach

Flows are per-module, not per-file-type. Tests and UI are ATTRIBUTES of modules.

### Wrong: File-type grouping
```
tests/*.test.ts → tdd-all-tests     ❌
components/*.tsx → vdd-all-ui       ❌
```

### Correct: Module-centric
```
src/auth/ (all files) → ONE flow (sdd-auth or tdd-auth)
```

### Algorithm
1. IDENTIFY MODULE BOUNDARIES (directory with cohesive functionality)
2. ANALYZE PURPOSE (what problem does it solve?)
3. DETERMINE TYPE BY PURPOSE:
   - Internal logic → SDD
   - Client-facing → DDD
   - Correctness-critical → TDD
   - UX-primary → VDD
4. RECORD ATTRIBUTES (has_tests, has_ui, has_api)

### Colocation Principle
Tests, UI, docs of a module = attributes, NOT separate flows

---

## ADR Auto-Detection

### Constraining (choices already made)
- Framework/library selections
- Architectural patterns
- Database choices
- API styles

### Enabling (capabilities to support)
- Extension points
- Plugin systems
- Configuration options

---

## Execution Steps

### Step 1: Initialize
- Read flows/legacy/_status.md
- Determine mode (BFS/DFS)
- Set target path and focus

### Step 2: Analyze (Iterative per depth)
- List contents at current depth
- Identify module boundaries
- Detect flow types
- Identify ADR candidates
- Update analysis/depth-N.md
- Proceed to next depth

### Step 3: Generate Flows
- Create flows/[type]-[name]/ in DRAFT status
- Generate requirements from code behavior
- Generate specifications from implementation

### Step 4: Generate ADRs
- Create flows/adr-[NNN]-[name]/ in DRAFT status
- Type: constraining | enabling

### Step 5: Generate Review List
- Update flows/legacy/review.md
- List all items with confidence levels

---

## Files

```
flows/legacy/
├── _status.md          # Current depth, progress
├── log.md              # Iteration history
├── analysis/           # Results per depth
│   └── depth-N.md
├── mapping.md          # Code → flow mapping
└── review.md           # Items for review
```

---

## Idempotency & Upsert Semantics

Command is idempotent - multiple runs produce consistent results.

### Check-Before-Write Pattern
1. Check if flow exists
2. If EXISTS → append delta only (additive changes)
3. If NOT EXISTS → create new

### Additive-Only Changes
- Never overwrite existing content
- Append new discoveries as "Legacy Additions" sections
- Conflicts → add to review.md, human resolves

### Mapping Actions
- CREATED - New flow
- UPDATED - Appended to existing
- UNCHANGED - No new info
- CONFLICT - Contradicts existing

---

## Output

All flows and ADRs created/updated in **DRAFT** status:
- Require human review
- After review → approve or revise
- Then available for /roadmap

---

## Always

- Create flows in DRAFT status only
- Log every iteration
- Generate review list with confidence levels
- Never auto-approve
"""
